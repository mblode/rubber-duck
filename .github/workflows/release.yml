name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Preflight shared scheme
        run: |
          set -euo pipefail
          if ! xcodebuild -list -project RubberDuck.xcodeproj | grep -qE '^[[:space:]]+Commandment$'; then
            echo "Required shared scheme 'Commandment' not found in RubberDuck.xcodeproj"
            echo "Available schemes:"
            xcodebuild -list -project RubberDuck.xcodeproj
            exit 1
          fi

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Commandment \
            -derivedDataPath /tmp/rubber-duck-build

      - name: Extract version from tag
        id: ci-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '0.0.0')" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          xcodebuild -scheme Commandment \
            -configuration Debug \
            -derivedDataPath /tmp/rubber-duck-build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=${{ steps.ci-version.outputs.VERSION }} \
            build

      - name: Test
        run: |
          xcodebuild -scheme Commandment \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath /tmp/rubber-duck-build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=${{ steps.ci-version.outputs.VERSION }} \
            test

  cli-verify:
    name: CLI Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build, typecheck, lint, unit tests
        run: npm run build && npm run typecheck && npm run lint && npm test

      - name: CLI verification
        shell: bash
        run: |
          set -euo pipefail

          node dist/cli.js --help

          TMP_HOME=$(mktemp -d)
          export HOME="$TMP_HOME"
          ln -s "$GITHUB_WORKSPACE/cli" "$TMP_HOME/repo"

          node dist/cli.js sessions --all
          node dist/cli.js ~/repo > "$TMP_HOME/attach.log" 2>&1 &
          ATTACH_PID=$!
          sleep 2
          kill -INT "$ATTACH_PID" || true
          wait "$ATTACH_PID" || true
          node dist/cli.js sessions --all

          set +e
          node dist/cli.js doctor > "$TMP_HOME/doctor.log" 2>&1
          set -e

          if ! grep -q "duck doctor" "$TMP_HOME/doctor.log"; then
            cat "$TMP_HOME/doctor.log"
            echo "duck doctor output missing header"
            exit 1
          fi

          APP_DIR="$TMP_HOME/Library/Application Support/RubberDuck"
          if [ -f "$APP_DIR/duck-daemon.pid" ]; then
            DAEMON_PID="$(cat "$APP_DIR/duck-daemon.pid")"
            kill "$DAEMON_PID" || true
          fi

  release:
    name: Release
    needs: [build-and-test, cli-verify]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Import code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Commandment \
            -derivedDataPath /tmp/rubber-duck-build

      - name: Archive
        run: |
          xcodebuild -scheme Commandment \
            -configuration Release \
            -derivedDataPath /tmp/rubber-duck-build \
            -archivePath /tmp/rubber-duck-build/RubberDuck.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION=${{ steps.version.outputs.VERSION }} \
            archive

      - name: Export archive
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/rubber-duck-build/RubberDuck.xcarchive \
            -exportPath /tmp/rubber-duck-build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate DMG background
        run: swift installer/make-dmg-bg.swift

      - name: Create DMG
        run: |
          create-dmg \
            --volname "RubberDuck" \
            --background "installer/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 700 460 \
            --icon-size 128 \
            --icon "RubberDuck.app" 175 230 \
            --app-drop-link 525 230 \
            --hide-extension "RubberDuck.app" \
            --text-size 14 \
            --volicon "/tmp/rubber-duck-build/export/RubberDuck.app/Contents/Resources/AppIcon.icns" \
            --no-internet-enable \
            "/tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg" \
            "/tmp/rubber-duck-build/export/RubberDuck.app" \
          || test -f "/tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        if: ${{ secrets.NOTARIZE_APPLE_ID != '' && secrets.NOTARIZE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: |
          xcrun notarytool submit "/tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg" \
            --apple-id "${{ secrets.NOTARIZE_APPLE_ID }}" \
            --password "${{ secrets.NOTARIZE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

      - name: Staple notarization ticket
        if: ${{ secrets.NOTARIZE_APPLE_ID != '' && secrets.NOTARIZE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: xcrun stapler staple "/tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Skip notarization (missing secrets)
        if: ${{ secrets.NOTARIZE_APPLE_ID == '' || secrets.NOTARIZE_PASSWORD == '' || secrets.APPLE_TEAM_ID == '' }}
        run: |
          echo "::warning::NOTARIZE_APPLE_ID / NOTARIZE_PASSWORD not configured. Publishing signed-but-unstapled DMG."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RubberDuck ${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            1. Download **RubberDuck-${{ steps.version.outputs.VERSION }}.dmg** below
            2. Open the DMG and drag RubberDuck to Applications
            3. Launch RubberDuck from Applications
            4. Click the microphone icon in the menu bar and enter your OpenAI API key in Settings
            5. Grant microphone and accessibility permissions when prompted

            **Requires macOS 15.2 or later and an OpenAI API key.**
          files: /tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_PATH="/tmp/rubber-duck-build/RubberDuck-${VERSION}.dmg"
          DMG_SIZE=$(stat -f%z "${DMG_PATH}")
          RELEASE_URL="https://github.com/mblode/rubber-duck/releases/tag/v${VERSION}"
          DOWNLOAD_URL="https://github.com/mblode/rubber-duck/releases/download/v${VERSION}/RubberDuck-${VERSION}.dmg"
          PUB_DATE=$(LC_ALL=C date -u "+%a, %d %b %Y %H:%M:%S +0000")
          SPARKLE_SIGN_UPDATE="/tmp/rubber-duck-build/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update"

          if [[ -z "${SPARKLE_PRIVATE_ED_KEY}" ]]; then
            echo "SPARKLE_PRIVATE_ED_KEY secret is required for signed appcasts"
            exit 1
          fi

          ED_SIGNATURE=$(printf '%s' "${SPARKLE_PRIVATE_ED_KEY}" | "${SPARKLE_SIGN_UPDATE}" --ed-key-file - -p "${DMG_PATH}")

          cat > /tmp/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0"
              xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"
              xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>RubberDuck</title>
              <link>https://github.com/mblode/rubber-duck</link>
              <description>RubberDuck updates</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <link>${RELEASE_URL}</link>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.2</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  type="application/octet-stream"
                  length="${DMG_SIZE}" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Publish appcast to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout -B main origin/main

          cp /tmp/appcast.xml appcast.xml

          if git diff --quiet -- appcast.xml; then
            echo "appcast.xml unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for v${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Compute DMG SHA256
        id: sha
        run: echo "SHA256=$(shasum -a 256 /tmp/rubber-duck-build/RubberDuck-${{ steps.version.outputs.VERSION }}.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"
          CASK_PATH="Casks/rubber-duck.rb"

          # Generate cask file
          cat > /tmp/rubber-duck.rb << EOF
          cask "rubber-duck" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/mblode/rubber-duck/releases/download/v#{version}/RubberDuck-#{version}.dmg"
            name "RubberDuck"
            desc "macOS menu bar dictation app using OpenAI transcription"
            homepage "https://github.com/mblode/rubber-duck"

            depends_on macos: ">= :sequoia"
            auto_updates true

            app "RubberDuck.app"

            zap trash: [
              "~/Library/Preferences/co.blode.rubber-duck.plist",
              "~/Library/Application Support/co.blode.rubber-duck",
            ]
          end
          EOF
          CONTENT_B64="$(base64 < /tmp/rubber-duck.rb | tr -d '\n')"

          # Create the cask file on first publish, then update it on subsequent releases.
          if FILE_SHA=$(gh api "repos/mblode/homebrew-tap/contents/${CASK_PATH}" --jq '.sha' 2>/dev/null); then
            gh api "repos/mblode/homebrew-tap/contents/${CASK_PATH}" \
              -X PUT \
              -f message="Update rubber-duck to ${VERSION}" \
              -f content="${CONTENT_B64}" \
              -f sha="${FILE_SHA}"
          else
            gh api "repos/mblode/homebrew-tap/contents/${CASK_PATH}" \
              -X PUT \
              -f message="Add rubber-duck cask ${VERSION}" \
              -f content="${CONTENT_B64}"
          fi
